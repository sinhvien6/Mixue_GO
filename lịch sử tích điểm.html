<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<title>Mixue GO - Lịch sử tích điểm</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: '#bb0013', 'primary-container': '#e71520', 'on-primary-container': '#fffbff',
          'primary-fixed': '#ffdad6', 'on-primary': '#ffffff', 'on-primary-fixed-variant': '#93000d',
          surface: '#f4fafd', 'surface-container': '#e8eff1', 'surface-container-lowest': '#ffffff',
          'surface-container-high': '#e2e9ec', 'on-surface': '#161d1f', 'on-surface-variant': '#5e3f3c',
          secondary: '#5d5f5f', 'secondary-container': '#dfe0e0', 'on-secondary-container': '#616363',
          tertiary: '#4c5f66', 'tertiary-fixed': '#d2e6ef', background: '#f4fafd',
        },
        fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
      }
    }
  };
</script>
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4fafd; }
  .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  .snow-king-float { animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .bento-card { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .bento-card:active { transform: scale(0.98); }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">

<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface z-50 shadow-sm flex justify-between items-center px-5 py-2">
  <div class="flex items-center gap-4">
    <a href="tích điểm.html" class="material-symbols-rounded text-primary active:scale-95 transition-transform">arrow_back</a>
    <h1 class="text-lg font-bold text-primary tracking-tight">Lịch sử tích điểm</h1>
  </div>
  <div class="flex items-center gap-2">
    <button class="notif-bell relative p-2 rounded-full hover:bg-surface-container transition-colors">
      <span class="material-symbols-rounded text-on-surface-variant">notifications</span>
      <span class="notif-badge hidden">0</span>
    </button>
    <div class="flex items-center gap-1">
      <span class="material-symbols-rounded text-primary fill-1">local_fire_department</span>
      <span id="streak-count" class="font-bold text-primary">—</span>
    </div>
  </div>
</header>

<main class="px-5 pt-4 space-y-6">
  <!-- Summary Card -->
  <section class="relative overflow-hidden rounded-2xl bg-primary-container p-6 shadow-lg text-on-primary-container">
    <div class="absolute -top-12 -right-12 w-32 h-32 bg-white/10 rounded-full blur-3xl"></div>
    <div class="flex justify-between items-start">
      <div>
        <p class="text-xs font-semibold uppercase tracking-wider opacity-90">Tổng Snow Coins</p>
        <div class="flex items-baseline gap-1 mt-1">
          <h2 id="coins-display" class="text-4xl font-extrabold">—</h2>
          <span class="text-base opacity-80">Coins</span>
        </div>
      </div>
      <div class="snow-king-float">
        <img class="w-20 h-20 drop-shadow-xl"
             src="https://lh3.googleusercontent.com/aida-public/AB6AXuBA-oQZkUwbfwhYHGY6_zTGkuPQtZ0pPElh6CKiI5f30ra4rdXyjoBgWEhR6vlKGZEI5TLxKIZ0J33pvL8_ypV1c-bU0k2AeBchel2Ov7TBlt7kAbOCN_FFxxv0AYsb9nl3HMFjn9yFjXt7Cav7bLNjz9_9mSbcSGKdkI3d2zbQFMX7Zf1Ym3XwjBdv2eQsoLciqDMrCSoKcpZCujOaYgZ-VxaMSFsWIe--X9VqtVnwfrDhr_Uuw2zwMTQoAEnwC7TLOnnHLgkmExY"
             alt="Snow King" onerror="this.parentElement.innerHTML='<span style=font-size:60px>🪙</span>'">
      </div>
    </div>
    <div class="mt-4 pt-4 border-t border-white/20 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="material-symbols-rounded text-[18px]">stars</span>
        <span id="tier-label" class="text-sm font-medium">Thành viên</span>
      </div>
      <span class="material-symbols-rounded">chevron_right</span>
    </div>
  </section>

  <!-- Filter Tabs -->
  <nav class="flex gap-2 p-1 bg-surface-container rounded-full">
    <button data-filter="all"    onclick="switchFilter(this)" class="filter-tab flex-1 py-2 rounded-full text-xs font-bold transition-all bg-primary text-white shadow-sm">Tất cả</button>
    <button data-filter="earn"   onclick="switchFilter(this)" class="filter-tab flex-1 py-2 rounded-full text-xs font-bold transition-all text-on-secondary-container">Tích điểm</button>
    <button data-filter="redeem" onclick="switchFilter(this)" class="filter-tab flex-1 py-2 rounded-full text-xs font-bold transition-all text-on-secondary-container">Đổi quà</button>
  </nav>

  <!-- Transaction List -->
  <section>
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-base font-bold text-on-surface">Gần đây</h3>
      <span id="tx-count" class="text-xs text-secondary"></span>
    </div>
    <div id="tx-list" class="space-y-2">
      <div class="flex items-center justify-center py-8 text-secondary text-sm">Đang tải...</div>
    </div>
  </section>
</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 bg-surface shadow-lg rounded-t-xl">
  <a href="trang chủ.html" class="flex flex-col items-center justify-center text-secondary p-2 rounded-xl transition-all active:scale-90">
    <span class="material-symbols-rounded">home</span>
    <span class="text-[10px] font-semibold mt-1">Home</span>
  </a>
  <a href="tích điểm.html" class="flex flex-col items-center justify-center bg-primary/10 text-primary rounded-full px-4 py-1 transition-all active:scale-90">
    <span class="material-symbols-rounded fill-1">stars</span>
    <span class="text-[10px] font-bold mt-1">Rewards</span>
  </a>
  <a href="bản đồ chỉ đường.html" class="flex flex-col items-center justify-center text-secondary p-2 rounded-xl transition-all active:scale-90">
    <span class="material-symbols-rounded">map</span>
    <span class="text-[10px] font-semibold mt-1">Map</span>
  </a>
  <a href="profile.html" class="flex flex-col items-center justify-center text-secondary p-2 rounded-xl transition-all active:scale-90">
    <span class="material-symbols-rounded">person</span>
    <span class="text-[10px] font-semibold mt-1">Profile</span>
  </a>
</nav>

<script src="shared/app.js"></script>
<script>
  let allTx = [];
  let activeFilter = 'all';

  function tierFromCoins(coins) {
    if (coins >= 5000) return 'Kim Cương';
    if (coins >= 2000) return 'Vàng';
    if (coins >= 500)  return 'Bạc';
    return 'Đồng';
  }

  function switchFilter(btn) {
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.remove('bg-primary','text-white','shadow-sm');
      t.classList.add('text-on-secondary-container');
    });
    btn.classList.add('bg-primary','text-white','shadow-sm');
    btn.classList.remove('text-on-secondary-container');
    activeFilter = btn.dataset.filter;
    renderList();
  }

  function renderList() {
    const filtered = activeFilter === 'all' ? allTx : allTx.filter(t => t.type === activeFilter);
    const list = document.getElementById('tx-list');
    document.getElementById('tx-count').textContent = `${filtered.length} giao dịch`;

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="flex flex-col items-center justify-center py-12 text-gray-400 gap-3">
          <span class="material-symbols-rounded text-5xl text-primary/30">history</span>
          <p class="text-sm text-center">Chưa có giao dịch nào<br>trong mục này.</p>
        </div>`;
      return;
    }

    const icons = { earn: 'shopping_bag', redeem: 'card_giftcard' };
    const bgColor = { earn: 'bg-primary-fixed', redeem: 'bg-surface-container-high' };

    list.innerHTML = filtered.map(t => {
      const sign   = t.type === 'earn' ? '+' : '-';
      const color  = t.type === 'earn' ? 'text-green-600' : 'text-primary';
      const date   = t.createdAt ? formatDate(t.createdAt) + ' · ' + (t.createdAt?.toDate ? t.createdAt.toDate().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}) : '') : '';
      return `
        <div class="bento-card flex items-center justify-between p-4 bg-surface-container-lowest border border-surface-container rounded-xl shadow-sm">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full ${bgColor[t.type]} flex items-center justify-center">
              <span class="material-symbols-rounded text-primary">${icons[t.type] || 'generating_tokens'}</span>
            </div>
            <div>
              <h4 class="font-semibold text-sm text-on-surface">${t.description}</h4>
              <p class="text-xs text-secondary">${date}</p>
            </div>
          </div>
          <span class="font-bold text-base ${color}">${sign}${t.amount.toLocaleString('vi-VN')}</span>
        </div>`;
    }).join('');
  }

  (async () => {
    const user = await authGuard();
    await initNotificationDrawer(user.uid);
    const data = await getUserData(user.uid);
    const coins = data?.snowCoins ?? 0;

    document.getElementById('coins-display').textContent = coins.toLocaleString('vi-VN');
    document.getElementById('streak-count').textContent  = data?.streak ?? 0;
    document.getElementById('tier-label').textContent    = `Hạng Thành viên ${tierFromCoins(coins)}`;

    const snap = await db.collection('transactions')
      .where('userId', '==', user.uid)
      .get();

    allTx = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0))
      .slice(0, 50);
    renderList();
  })();
</script>
</body>
</html>
