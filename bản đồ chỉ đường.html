<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<title>Mixue GO - Bản đồ cửa hàng</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: '#bb0013', 'primary-container': '#e71520', 'on-primary-container': '#fffbff',
          'on-primary': '#ffffff', surface: '#f4fafd', 'surface-container': '#e8eff1',
          'surface-container-low': '#eef5f7', 'on-surface': '#161d1f', 'on-surface-variant': '#5e3f3c',
          secondary: '#5d5f5f', 'secondary-container': '#dfe0e0', 'on-secondary-container': '#616363',
          'outline-variant': '#e8bcb7', background: '#f4fafd',
        },
        fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
      }
    }
  };
</script>
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; }
  .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  .bottom-sheet { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); }
  .bottom-sheet.active { transform: translateY(0); }
  .leaflet-bottom { bottom: 76px; }
  .leaflet-control-zoom { border:none !important; box-shadow:0 2px 8px rgba(0,0,0,0.2) !important; border-radius:12px !important; overflow:hidden; }
  .leaflet-control-zoom a { font-family:'Plus Jakarta Sans',sans-serif !important; font-size:18px !important; width:36px !important; height:36px !important; line-height:36px !important; color:#161d1f !important; }
  .leaflet-control-attribution { font-size:10px; background:rgba(255,255,255,0.7) !important; backdrop-filter:blur(4px); border-radius:4px; }
</style>
</head>
<body class="bg-background text-on-background overflow-hidden h-screen flex flex-col">

<!-- Top App Bar -->
<header class="w-full top-0 sticky bg-surface shadow-sm z-40 flex justify-between items-center px-5 py-2">
  <div class="flex items-center gap-2">
    <img src="mixue logo.png" class="h-8 object-contain" alt="Mixue" onerror="this.style.display='none'">
  </div>
  <div class="flex items-center gap-2">
    <button class="notif-bell relative p-2 rounded-full hover:bg-surface-container transition-colors">
      <span class="material-symbols-rounded text-on-surface-variant">notifications</span>
      <span class="notif-badge hidden">0</span>
    </button>
    <div class="bg-primary/10 px-3 py-1 rounded-full flex items-center gap-1 cursor-pointer">
      <span id="streak-count" class="text-primary font-bold text-sm">—</span>
      <span>🔥</span>
    </div>
  </div>
</header>

<!-- Map Canvas -->
<main class="flex-grow relative w-full" style="min-height:0">
  <div id="map" class="absolute inset-0 z-0"></div>

  <!-- Floating Search Bar -->
  <div class="absolute top-4 left-5 right-5 z-30">
    <div class="bg-surface/90 backdrop-blur-md rounded-full shadow-lg p-2 flex items-center gap-2 border border-outline-variant/30">
      <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant flex-shrink-0" onclick="doSearch()">
        <span class="material-symbols-rounded">search</span>
      </button>
      <input id="search-input"
        class="bg-transparent border-none outline-none focus:ring-0 flex-grow text-sm text-on-surface placeholder:text-on-surface-variant/60 min-w-0"
        placeholder="Tìm cửa hàng tại Hà Nội..." type="text">
      <button id="my-location-btn" class="w-10 h-10 bg-primary text-white rounded-full flex items-center justify-center transition-all active:scale-90 flex-shrink-0">
        <span class="material-symbols-rounded fill-1">my_location</span>
      </button>
    </div>
  </div>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet absolute bottom-0 left-0 right-0 bg-surface rounded-t-3xl shadow-2xl z-[55]" id="store-sheet">
    <div class="w-12 h-1.5 bg-outline-variant/30 rounded-full mx-auto mt-3 cursor-pointer" onclick="closeSheet()"></div>
    <div class="p-5 pb-24">
      <div class="flex justify-between items-start mb-4">
        <div class="flex-1 min-w-0 pr-3">
          <h2 id="sheet-name" class="text-lg font-bold text-on-surface"></h2>
          <p class="text-sm text-on-surface-variant flex items-center gap-1 mt-1">
            <span class="material-symbols-rounded text-sm fill-1">location_on</span>
            <span id="sheet-addr"></span>
          </p>
        </div>
        <div class="bg-primary/10 px-3 py-1 rounded-full flex-shrink-0">
          <span id="sheet-dist" class="text-xs font-bold text-primary"></span>
        </div>
      </div>
      <div id="sheet-status" class="rounded-xl p-4 mb-6 flex items-center gap-3">
        <div id="sheet-dot" class="w-3 h-3 rounded-full animate-pulse flex-shrink-0 status-dot"></div>
        <p id="sheet-status-text" class="text-xs font-semibold"></p>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <a id="sheet-detail-btn" href="chi tiết cửa hàng.html" class="bg-secondary-container text-on-secondary-container py-3 rounded-full text-xs font-bold flex items-center justify-center gap-2 transition-all active:scale-95">
          <span class="material-symbols-rounded">info</span> Chi tiết
        </a>
        <button id="sheet-notify-btn" data-active="false" data-store-id=""
          class="bg-primary text-white py-3 rounded-full text-xs font-bold flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-primary/20">
          <span class="material-symbols-rounded">notifications</span>
          <span class="notify-text">Nhận thông báo</span>
        </button>
      </div>
    </div>
  </div>
</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 w-full flex justify-around items-center px-4 py-2 pb-safe bg-surface shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-50 rounded-t-xl">
  <a href="trang chủ.html" class="flex flex-col items-center text-secondary p-2 rounded-xl transition-all active:scale-90">
    <span class="material-symbols-rounded">home</span>
    <span class="text-[10px] font-semibold">Home</span>
  </a>
  <a href="tích điểm.html" class="flex flex-col items-center text-secondary p-2 rounded-xl transition-all active:scale-90">
    <span class="material-symbols-rounded">stars</span>
    <span class="text-[10px] font-semibold">Rewards</span>
  </a>
  <a href="bản đồ chỉ đường.html" class="flex flex-col items-center bg-primary/10 text-primary rounded-full px-4 py-1 transition-all active:scale-90">
    <span class="material-symbols-rounded fill-1">map</span>
    <span class="text-[10px] font-bold">Map</span>
  </a>
  <a href="profile.html" class="flex flex-col items-center text-secondary p-2 rounded-xl transition-all active:scale-90">
    <span class="material-symbols-rounded">person</span>
    <span class="text-[10px] font-semibold">Profile</span>
  </a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="shared/app.js"></script>
<script>
  let currentUid = null;
  let notifyPrefs = {};

  const hour = new Date().getHours();

  const STORES = [
    { id:'xuan-thuy',    name:'Mixue Xuân Thủy',    addr:'144 Xuân Thủy, Cầu Giấy, Hà Nội',     lat:21.0341, lng:105.7968, dist:'0.4 km' },
    { id:'kim-ma',       name:'Mixue Kim Mã',        addr:'77 Kim Mã, Ba Đình, Hà Nội',            lat:21.0337, lng:105.8321, dist:'1.2 km' },
    { id:'hang-bong',    name:'Mixue Hàng Bông',     addr:'28 Hàng Bông, Hoàn Kiếm, Hà Nội',      lat:21.0338, lng:105.8487, dist:'1.8 km' },
    { id:'tay-son',      name:'Mixue Tây Sơn',       addr:'165 Tây Sơn, Đống Đa, Hà Nội',         lat:21.0197, lng:105.8419, dist:'2.1 km' },
    { id:'le-van-luong', name:'Mixue Lê Văn Lương',  addr:'59 Lê Văn Lương, Thanh Xuân, Hà Nội',  lat:21.0072, lng:105.8103, dist:'3.5 km' },
    { id:'minh-khai',    name:'Mixue Minh Khai',     addr:'312 Minh Khai, Hai Bà Trưng, Hà Nội',  lat:21.0039, lng:105.8607, dist:'4.1 km' },
    { id:'nguyen-trai',  name:'Mixue Nguyễn Trãi',   addr:'363 Nguyễn Trãi, Thanh Xuân, Hà Nội',  lat:20.9987, lng:105.8233, dist:'5.0 km' },
  ].map(s => ({ ...s, traffic: getTrafficLevel(hour) }));

  // Status configs derived from traffic levels
  function statusCfg(level) {
    return {
      empty:    { bg:'bg-green-50 border border-green-100', dot:'bg-green-500', text:'text-green-700', pinColor:'#22c55e', iconColor:'#15803d', desc:'Đang vắng — Ghé ngay để nhận x2 điểm!' },
      moderate: { bg:'bg-yellow-50 border border-yellow-100', dot:'bg-yellow-500', text:'text-yellow-700', pinColor:'#eab308', iconColor:'#854d0e', desc:'Vừa phải — Thời gian chờ ~5 phút' },
      busy:     { bg:'bg-red-50 border border-red-100', dot:'bg-red-500', text:'text-red-700', pinColor:'#bb0013', iconColor:'#bb0013', desc:'Đông đúc — Thời gian chờ ~15 phút' },
    }[level];
  }

  const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([21.0245,105.8412], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
  L.control.zoom({ position:'bottomright' }).addTo(map);
  L.control.attribution({ position:'bottomleft', prefix:false }).addAttribution('© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a>').addTo(map);

  function createPin(level) {
    const c = statusCfg(level);
    return L.divIcon({
      className: '',
      html: `<div style="width:42px;height:42px;background:white;border:3px solid ${c.pinColor};border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,0.25);cursor:pointer;">
        <span class="material-symbols-rounded" style="font-size:20px;color:${c.iconColor};font-variation-settings:'FILL' 1">storefront</span>
      </div>`,
      iconSize:[42,42], iconAnchor:[21,21]
    });
  }

  STORES.forEach(s => {
    const m = L.marker([s.lat, s.lng], { icon: createPin(s.traffic.level) }).addTo(map);
    m.on('click', e => { L.DomEvent.stopPropagation(e); openSheet(s); });
  });

  let activeStoreId = null;

  function openSheet(store) {
    activeStoreId = store.id;
    const cfg = statusCfg(store.traffic.level);
    document.getElementById('sheet-name').textContent = store.name;
    document.getElementById('sheet-addr').textContent = store.addr;
    document.getElementById('sheet-dist').textContent = store.dist;
    document.getElementById('sheet-status').className = `rounded-xl p-4 mb-6 flex items-center gap-3 ${cfg.bg}`;
    document.getElementById('sheet-dot').className = `w-3 h-3 rounded-full animate-pulse flex-shrink-0 status-dot ${cfg.dot}`;
    const statusText = document.getElementById('sheet-status-text');
    statusText.className = `text-xs font-semibold ${cfg.text}`;
    statusText.textContent = `${store.traffic.label} — ${cfg.desc}`;
    document.getElementById('sheet-detail-btn').href = `chi tiết cửa hàng.html?store=${store.id}`;

    // Restore notify state
    const notifyBtn = document.getElementById('sheet-notify-btn');
    const isActive  = notifyPrefs[store.id] ?? false;
    notifyBtn.dataset.storeId = store.id;
    notifyBtn.dataset.active  = String(isActive);
    notifyBtn.querySelector('.notify-text').textContent = isActive ? 'Đã bật thông báo ✓' : 'Nhận thông báo';
    notifyBtn.className = `py-3 rounded-full text-xs font-bold flex items-center justify-center gap-2 transition-all active:scale-95 ${isActive ? 'bg-white border-2 border-primary text-primary' : 'bg-primary text-white shadow-lg shadow-primary/20'}`;

    document.getElementById('store-sheet').classList.add('active');
    map.panTo([store.lat, store.lng], { animate:true, duration:0.5 });
  }

  function closeSheet() { document.getElementById('store-sheet').classList.remove('active'); }
  map.on('click', closeSheet);

  document.getElementById('sheet-notify-btn').addEventListener('click', async function() {
    if (!currentUid || !this.dataset.storeId) return;
    const storeId  = this.dataset.storeId;
    const isActive = this.dataset.active === 'true';
    const newState = !isActive;
    this.dataset.active = String(newState);

    notifyPrefs[storeId] = newState;
    const prefKey = `notificationPrefs.${storeId}`;
    await db.collection('users').doc(currentUid).update({ [prefKey]: newState });

    this.querySelector('.notify-text').textContent = newState ? 'Đã bật thông báo ✓' : 'Nhận thông báo';
    this.className = `py-3 rounded-full text-xs font-bold flex items-center justify-center gap-2 transition-all active:scale-95 ${newState ? 'bg-white border-2 border-primary text-primary' : 'bg-primary text-white shadow-lg shadow-primary/20'}`;
    showToast(newState ? 'Đã bật thông báo cho cửa hàng này 🔔' : 'Đã tắt thông báo', newState ? 'success' : 'info');
  });

  function doSearch() {
    const raw = document.getElementById('search-input').value.trim();
    if (!raw) return;
    const q = normalizeVietnamese(raw);
    const match = STORES.find(s =>
      normalizeVietnamese(s.name).includes(q) || normalizeVietnamese(s.addr).includes(q)
    );
    if (match) {
      map.flyTo([match.lat, match.lng], 16, { duration:0.8 });
      openSheet(match);
      document.getElementById('search-input').blur();
    } else {
      showToast('Không tìm thấy cửa hàng phù hợp', 'error');
    }
  }
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });

  function updateDistancesFromCoords(lat, lng) {
    STORES.forEach(s => {
      s.distKm = haversineKm(lat, lng, s.lat, s.lng);
      s.dist   = fmtDist(s.distKm);
    });
    if (activeStoreId) {
      const active = STORES.find(s => s.id === activeStoreId);
      if (active) document.getElementById('sheet-dist').textContent = active.dist;
    }
  }

  document.getElementById('my-location-btn').addEventListener('click', () => {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(p => {
        const { latitude, longitude } = p.coords;
        map.flyTo([latitude, longitude], 15, { duration:0.8 });
        updateDistancesFromCoords(latitude, longitude);
      }, () => map.flyTo([21.0285,105.8542], 13, { duration:0.8 }));
    }
  });

  // Passive live tracking — updates distances as user moves
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      ({ coords }) => updateDistancesFromCoords(coords.latitude, coords.longitude),
      () => {}
    );
  }

  (async () => {
    const user = await authGuard();
    currentUid = user.uid;

    const data = await getUserData(user.uid);
    document.getElementById('streak-count').textContent = data?.streak ?? 0;
    notifyPrefs = data?.notificationPrefs || {};

    await initNotificationDrawer(user.uid);
  })();
</script>
</body>
</html>
