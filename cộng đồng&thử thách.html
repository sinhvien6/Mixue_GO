<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<title>Mixue GO - Cộng đồng</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: '#bb0013', 'primary-container': '#e71520', 'on-primary-container': '#fffbff',
          'primary-fixed': '#ffdad6', 'on-primary': '#ffffff',
          surface: '#f4fafd', 'surface-container': '#e8eff1', 'surface-container-lowest': '#ffffff',
          'surface-container-low': '#eef5f7', 'surface-container-high': '#e2e9ec',
          'surface-container-highest': '#dde4e6',
          'on-surface': '#161d1f', 'on-surface-variant': '#5e3f3c',
          secondary: '#5d5f5f', 'secondary-container': '#dfe0e0', 'on-secondary-container': '#616363',
          tertiary: '#4c5f66', 'tertiary-fixed': '#d2e6ef', 'on-tertiary-fixed': '#0b1e24', 'on-tertiary-fixed-variant': '#374951',
          'outline-variant': '#e8bcb7', background: '#f4fafd',
        },
        fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
      }
    }
  };
</script>
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
  .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  .bento-card { transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .bento-card:active { transform: scale(0.97); }
  .liked .heart-icon { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .liked { color: #bb0013; }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-32">

<!-- Top App Bar -->
<header class="w-full top-0 sticky z-50 bg-surface shadow-sm flex justify-between items-center px-5 py-2">
  <div class="flex items-center gap-2">
    <img src="mixue logo.png" class="h-8 object-contain" alt="Mixue" onerror="this.style.display='none'">
  </div>
  <div class="flex items-center gap-2">
    <button class="notif-bell relative p-2 rounded-full hover:bg-surface-container transition-colors">
      <span class="material-symbols-rounded text-on-surface-variant">notifications</span>
      <span class="notif-badge hidden">0</span>
    </button>
    <div class="bg-primary/10 px-3 py-1 rounded-full flex items-center gap-1">
      <span id="streak-count" class="font-bold text-primary text-sm">—</span>
      <span>🔥</span>
    </div>
  </div>
</header>

<main class="px-5 pt-6 space-y-8">

  <!-- User Profile Snippet -->
  <section class="bg-surface-container-lowest rounded-2xl p-4 shadow-sm border border-surface-container-high flex items-center gap-4 fade-in-up">
    <div class="relative flex-shrink-0">
      <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center overflow-hidden border-2 border-primary">
        <span class="material-symbols-rounded text-4xl text-primary">person</span>
      </div>
      <div class="absolute -bottom-1 -right-1 bg-primary text-white p-0.5 rounded-full shadow-md">
        <span class="material-symbols-rounded text-[14px] fill-1">verified</span>
      </div>
    </div>
    <div class="flex-1 min-w-0">
      <h2 id="user-name" class="text-base font-bold text-on-surface truncate">—</h2>
      <div class="flex gap-2 mt-1">
        <span id="user-level-badge" class="bg-surface-container text-on-surface-variant text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">—</span>
        <span id="user-title-badge" class="bg-tertiary-fixed text-on-tertiary-fixed-variant text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">—</span>
      </div>
    </div>
    <div class="flex gap-1 flex-shrink-0">
      <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
        <span class="material-symbols-rounded text-primary fill-1 text-[18px]">workspace_premium</span>
      </div>
      <div id="streak-badge-wrap" class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center hidden">
        <span class="material-symbols-rounded text-primary fill-1 text-[18px]">local_fire_department</span>
      </div>
    </div>
  </section>

  <!-- Challenges Bento -->
  <section>
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold text-on-surface">Thử thách cùng bạn bè</h3>
      <button class="text-primary font-bold text-sm active:opacity-70" onclick="document.getElementById('community-section').scrollIntoView({behavior:'smooth'})">Xem tất cả</button>
    </div>
    <div class="grid grid-cols-2 gap-3">

      <!-- Leaderboard -->
      <div class="col-span-2 bg-surface-container-low rounded-2xl p-4 bento-card border border-surface-container-high overflow-hidden relative">
        <div class="flex justify-between items-center mb-4">
          <span class="font-bold text-xs uppercase tracking-widest text-on-secondary-container">Leaderboard: Streaks</span>
          <span class="material-symbols-rounded text-primary fill-1">leaderboard</span>
        </div>
        <div id="leaderboard-list" class="space-y-3">
          <div class="text-sm text-center text-secondary py-4">Đang tải...</div>
        </div>
      </div>

      <!-- Weekly Challenge -->
      <div class="bg-primary-container text-on-primary-container rounded-2xl p-4 bento-card relative overflow-hidden flex flex-col justify-between min-h-[150px]">
        <div class="absolute -top-4 -right-4 opacity-20 rotate-12">
          <span class="material-symbols-rounded text-[80px]">calendar_today</span>
        </div>
        <div>
          <h4 class="font-bold text-sm leading-tight mb-1">Ghé Mixue 3 ngày liên tiếp</h4>
          <p class="text-[11px] font-medium opacity-80 uppercase">Tuần này</p>
        </div>
        <div class="mt-4">
          <div class="flex justify-between text-xs font-bold mb-1">
            <span id="challenge-label">0/3 Ngày</span>
            <span id="challenge-pct">0%</span>
          </div>
          <div class="w-full bg-white/20 h-2 rounded-full overflow-hidden">
            <div id="challenge-bar" class="bg-white h-full rounded-full transition-all duration-700" style="width:0%"></div>
          </div>
        </div>
      </div>

      <!-- Badge Count -->
      <div class="bg-tertiary-fixed text-on-tertiary-fixed rounded-2xl p-4 bento-card flex flex-col justify-between items-center text-center min-h-[150px]">
        <span class="material-symbols-rounded text-tertiary fill-1 text-4xl">stars</span>
        <div>
          <div id="badges-count" class="text-2xl font-extrabold text-tertiary">—</div>
          <div class="text-[10px] font-bold uppercase opacity-70">Huy hiệu</div>
        </div>
      </div>
    </div>
  </section>

  <!-- Community Feed -->
  <section id="community-section" class="pb-8">
    <div class="flex items-center gap-2 mb-4">
      <span class="material-symbols-rounded text-primary fill-1">group</span>
      <h3 class="text-lg font-bold text-on-surface">Cộng đồng</h3>
    </div>
    <div id="feed-list" class="space-y-4">
      <div class="text-sm text-center text-secondary py-8">Đang tải...</div>
    </div>
    <!-- Write Post -->
    <div class="mt-4 bg-surface-container-lowest rounded-2xl p-4 border border-surface-container-high shadow-sm">
      <textarea id="post-input" rows="3"
        class="w-full text-sm text-on-surface placeholder:text-on-secondary-container/50 bg-transparent border-none outline-none resize-none"
        placeholder="Chia sẻ trải nghiệm Mixue của bạn..."></textarea>
      <div class="flex justify-end mt-2">
        <button onclick="submitPost()" class="bg-primary text-white text-xs font-bold px-5 py-2 rounded-full active:scale-95 transition-transform">Chia sẻ</button>
      </div>
    </div>
  </section>
</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 bg-surface shadow-[0_-2px_10px_rgba(0,0,0,0.05)] rounded-t-xl">
  <a href="trang chủ.html" class="flex flex-col items-center text-secondary p-2 rounded-xl transition-all active:scale-90">
    <span class="material-symbols-rounded">home</span>
    <span class="text-[10px] font-semibold">Home</span>
  </a>
  <a href="tích điểm.html" class="flex flex-col items-center text-secondary p-2 rounded-xl transition-all active:scale-90">
    <span class="material-symbols-rounded">stars</span>
    <span class="text-[10px] font-semibold">Rewards</span>
  </a>
  <a href="bản đồ chỉ đường.html" class="flex flex-col items-center text-secondary p-2 rounded-xl transition-all active:scale-90">
    <span class="material-symbols-rounded">map</span>
    <span class="text-[10px] font-semibold">Map</span>
  </a>
  <a href="profile.html" class="flex flex-col items-center text-secondary p-2 rounded-xl transition-all active:scale-90">
    <span class="material-symbols-rounded">person</span>
    <span class="text-[10px] font-semibold">Profile</span>
  </a>
</nav>

<script src="shared/app.js"></script>
<script>
  let currentUid  = null;
  let currentName = null;

  const MEDAL = ['🥇', '🥈', '🥉'];

  function titleFromLevel(level) {
    if (level >= 20) return 'Ice Legend';
    if (level >= 15) return 'Snow Master';
    if (level >= 10) return 'Ice Master';
    if (level >= 5)  return 'Frost Friend';
    return 'Snow Starter';
  }

  function renderLeaderboard(users, myUid) {
    const el = document.getElementById('leaderboard-list');
    if (!users.length) { el.innerHTML = '<p class="text-sm text-center text-secondary py-4">Chưa có dữ liệu.</p>'; return; }

    el.innerHTML = users.map((u, i) => {
      const isMe = u.id === myUid;
      const medal = MEDAL[i] || `<span class="font-extrabold text-secondary text-lg w-4">${i+1}</span>`;
      return `<div class="flex items-center gap-3 ${isMe ? 'bg-primary/5 p-2 rounded-xl -mx-2' : ''}">
        <span class="${typeof medal==='string'&&!medal.startsWith('<')?'text-xl':'font-extrabold text-secondary text-sm'} w-6 flex-shrink-0">${medal}</span>
        <div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center border border-surface-container flex-shrink-0">
          <span class="material-symbols-rounded text-[16px] text-on-secondary-container">person</span>
        </div>
        <span class="flex-1 font-semibold text-sm text-on-surface truncate">${isMe ? `${u.displayName||'Bạn'} (Bạn)` : (u.displayName||'Thành viên')}</span>
        <span class="text-primary font-bold text-sm">${u.streak||0} 🔥</span>
      </div>`;
    }).join('');
  }

  function renderFeed(posts, myUid) {
    const el = document.getElementById('feed-list');
    if (!posts.length) {
      el.innerHTML = `<div class="flex flex-col items-center py-10 gap-3 text-on-secondary-container">
        <span class="material-symbols-rounded text-4xl text-primary/30">forum</span>
        <p class="text-sm text-center">Chưa có bài đăng nào.<br>Hãy là người đầu tiên chia sẻ!</p>
      </div>`;
      return;
    }
    el.innerHTML = posts.map(p => {
      const liked  = p.likedBy?.includes(myUid) ?? false;
      const ago    = p.createdAt ? timeAgo(p.createdAt) : '';
      return `<div class="bg-surface-container-lowest rounded-2xl p-4 shadow-sm border border-surface-container-high transition-all hover:border-primary/20" data-post-id="${p.id}">
        <div class="flex items-start gap-3 mb-3">
          <div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-rounded text-on-secondary-container">person</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-bold text-on-surface truncate">${p.userName || 'Thành viên'}</p>
            <p class="text-[10px] text-secondary font-medium">${ago}</p>
          </div>
          <button onclick="toggleLike('${p.id}', this)" class="like-btn ${liked ? 'liked' : 'text-secondary'} flex items-center gap-1 transition-all active:scale-90 p-1">
            <span class="material-symbols-rounded heart-icon text-[18px]">favorite</span>
            <span class="like-count text-xs font-bold">${p.likes||0}</span>
          </button>
        </div>
        <p class="text-sm text-on-surface leading-relaxed">${p.content}</p>
        ${p.type === 'achievement' ? `
        <div class="mt-3 bg-surface-container-low rounded-xl p-3 flex items-center gap-3 border border-surface-container-high">
          <div class="w-10 h-10 bg-primary-container text-white rounded-lg flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-rounded fill-1 text-[20px]">local_fire_department</span>
          </div>
          <div>
            <h5 class="text-xs font-bold text-on-surface">${p.achievementTitle||''}</h5>
            <p class="text-[10px] text-secondary">${p.achievementDesc||''}</p>
          </div>
        </div>` : ''}
        <div class="flex gap-2 mt-3 flex-wrap">
          ${(p.tags||[]).map(t=>`<span class="bg-secondary-container text-on-secondary-container text-[10px] px-2 py-0.5 rounded font-semibold">#${t}</span>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  async function toggleLike(postId, btn) {
    if (!currentUid) return;
    const liked  = btn.classList.contains('liked');
    const newLiked = !liked;
    const countEl = btn.querySelector('.like-count');
    const count  = parseInt(countEl.textContent)||0;

    btn.classList.toggle('liked', newLiked);
    btn.classList.toggle('text-secondary', !newLiked);
    countEl.textContent = newLiked ? count + 1 : Math.max(0, count - 1);

    const ref = db.collection('community_posts').doc(postId);
    if (newLiked) {
      await ref.update({ likes: firebase.firestore.FieldValue.increment(1), likedBy: firebase.firestore.FieldValue.arrayUnion(currentUid) });
    } else {
      await ref.update({ likes: firebase.firestore.FieldValue.increment(-1), likedBy: firebase.firestore.FieldValue.arrayRemove(currentUid) });
    }
  }

  async function submitPost() {
    const input   = document.getElementById('post-input');
    const content = input.value.trim();
    if (!content) { showToast('Hãy nhập nội dung bài đăng!', 'error'); return; }
    if (content.length > 300) { showToast('Tối đa 300 ký tự', 'error'); return; }
    await db.collection('community_posts').add({
      userId: currentUid,
      userName: currentName || 'Thành viên',
      content,
      type: 'post',
      likes: 0,
      likedBy: [],
      tags: [],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    input.value = '';
    showToast('Bài đăng thành công! 🎉', 'success');
    loadFeed();
  }

  async function loadFeed() {
    const snap = await db.collection('community_posts').orderBy('createdAt', 'desc').limit(20).get();
    const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderFeed(posts, currentUid);
  }

  (async () => {
    const user = await authGuard();
    currentUid  = user.uid;

    const data  = await getUserData(user.uid);
    const streak  = data?.streak ?? 0;
    const level   = data?.level ?? 1;
    const badges  = data?.badges?.length ?? 0;
    currentName   = data?.displayName || user.displayName || 'Bạn';

    document.getElementById('user-name').textContent        = currentName;
    document.getElementById('user-level-badge').textContent = `Level ${level}`;
    document.getElementById('user-title-badge').textContent  = titleFromLevel(level);
    document.getElementById('streak-count').textContent      = streak;
    document.getElementById('badges-count').textContent      = badges;

    if (streak >= 7) document.getElementById('streak-badge-wrap').classList.remove('hidden');

    // Weekly challenge: count visits in last 7 days (visitDates are ISO YYYY-MM-DD)
    const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
    const weekAgoStr = weekAgo.toISOString().split('T')[0];
    const visits  = (data?.visitDates || []).filter(d => d >= weekAgoStr);
    const daysVisited = Math.min(visits.length, 3);
    const pct         = Math.round((daysVisited / 3) * 100);
    document.getElementById('challenge-label').textContent = `${daysVisited}/3 Ngày`;
    document.getElementById('challenge-pct').textContent   = `${pct}%`;
    setTimeout(() => { document.getElementById('challenge-bar').style.width = pct + '%'; }, 300);

    // Leaderboard
    const lbSnap = await db.collection('users').orderBy('streak', 'desc').limit(10).get();
    const lbUsers = lbSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const myIdx = lbUsers.findIndex(u => u.id === currentUid);
    // If current user not in top 10, inject them at the end for context
    if (myIdx === -1 && data) {
      lbUsers.push({ id: currentUid, displayName: currentName, streak });
    }
    renderLeaderboard(lbUsers.slice(0, 10), currentUid);

    // Feed
    await loadFeed();

    // Notifications
    await initNotificationDrawer(user.uid);
    await checkAndCreateNotifications(user.uid, data || {});
  })();
</script>
</body>
</html>
